name: "求真辨伪：全流程辩论工作流"
description: "搜集争议话题 → 审核筛选 → 质疑者与推理者反复辩论 → 裁判者总结 → Skill优化者判断是否沉淀"

agents_dir: "agents/roles"

llm:
  provider: deepseek
  model: deepseek-chat

concurrency: 6

inputs:
  - name: topic
    description: "待求真的主题（可选。如不提供，搜集者将自动搜索争议话题）"
    required: false
  - name: search_domain
    description: "搜索领域（可选。如：古代史、科技史、经典文本、公共叙事等）"
    required: false

steps:
  # ── 第 0 步：话题搜集者搜索和审核话题 ──
  - id: collector_search
    role: "collector"
    name: "话题搜集者"
    emoji: "🔍"
    task: |
      搜索和审核值得辩论的求真话题：

      ## 用户指定话题（如有）
      {{topic}}

      ## 搜索领域（如有）
      {{search_domain}}

      ## 你的任务
      1. 如果用户已提供话题，直接审核并精炼，跳过搜索
      2. 如果用户未提供话题，在指定领域（或默认全域）搜索争议性话题
      3. 对每个候选话题按五维度打分（争议性/可验证性/分层空间/知识价值/红旗密度）
      4. 筛选总分 ≥ 18 的话题
      5. 精炼入选话题为适合辩论的精准表述

      ## 输出要求

      ### 话题搜集报告
      - 搜集范围
      - 候选话题及审核评分
      - 入选话题及理由
      - 精炼后的话题表述（作为后续辩论的 topic）

      要求：宁缺毋滥。如果所有候选都不达标，诚实报告"无可辩论话题"。
    output: collector_report

  # ── 第 1 步：质疑者开第一枪 ──
  - id: challenger_round_1
    role: "challenger"
    name: "质疑者"
    emoji: "🔴"
    task: |
      针对以下主题，提出你的首轮质疑：

      ## 待求真主题
      {{topic}}

      ## 输出要求

      ### 命题拆分
      将主题拆成各层（人物/事件/文本/归属/学派/传承/包装），标注每层的可疑程度。

      ### 核心质疑（至少 3 个）
      每个质疑要具体、有场景感、指向明确的证据缺口或逻辑矛盾。

      ### 红旗标记
      列出你发现的所有红旗信号。

      ### 待追问的问题清单
      列出你希望对方回答的关键问题（至少 5 个），这些问题将驱动下一轮辩论。

      要求：不要泛泛而谈，每个质疑都要指向具体的证据链断裂点或利益动机。语气要犀利但不阴谋论。
    output: challenger_output

  # ── 第 2 步：推理者首次回应 ──
  - id: reasoner_round_1
    role: "reasoner"
    name: "推理者"
    emoji: "🟢"
    task: |
      质疑者已提出质疑，请逐一回应：

      ## 待求真主题
      {{topic}}

      ## 质疑者的质疑
      {{challenger_output}}

      ## 输出要求

      ### 逐条回应
      对质疑者的每个核心质疑，给出：
      - 质疑点复述
      - 现有证据（标注证据等级 S/A/B/C/D/E）
      - 回应分析
      - 承认的不确定性（诚实标注哪些是推断、哪些不可知）

      ### 分层归属判断
      对主题的各层给出归属阶梯判断（人物/学派/语料库/品牌/改写/神话）。

      ### 反质疑
      指出质疑者论证中的漏洞或过度推断之处。

      ### 待澄清的问题
      列出你认为质疑者需要进一步澄清的问题。

      要求：不回避质疑，不强行辩护。承认不确定性，但给出最可能的解释。每个回应都要有证据等级标注。
    output: reasoner_output

  # ── 第 3 步：质疑者第二轮（循环起点） ──
  - id: challenger_round
    role: "challenger"
    name: "质疑者"
    emoji: "🔴"
    task: |
      推理者已回应你的上一轮质疑，请继续深挖：

      ## 待求真主题
      {{topic}}

      ## 你的上一轮质疑
      {{challenger_output}}

      ## 推理者的回应
      {{reasoner_output}}

      ## 你的任务
      仔细审视推理者的回应，找出其中：
      1. 证据等级不足的断言（用 C/D/E 级证据支撑强宣称）
      2. 逻辑跳跃或循环论证
      3. 回避的核心问题
      4. 未充分解释的黑箱（传承链断裂、突然跃迁等）
      5. 利益动机未充分审视的环节

      ## 输出要求

      ### 对推理者回应的逐条反驳
      针对推理者的每条回应，指出证据强度问题、逻辑漏洞、未回答的问题。

      ### 新发现的质疑点
      基于推理者的回应，发现了哪些新的可疑之处？

      ### 本轮核心追问（至少 3 个）
      聚焦最关键的未解决问题，提出新的追问。

      ### 是否还有未解决的问题？
      如果认为已经没有实质性新问题可追问，请明确说"无新问题"并说明理由。
      如果仍有问题，请说"继续"。

      要求：不要重复之前的质疑。每一轮都要比上一轮更深一层。如果推理者的回应确实解决了你的疑虑，要诚实承认。
    output: challenger_output
    depends_on: [reasoner_round_1]

  # ── 第 4 步：推理者回应（循环体） ──
  - id: reasoner_round
    role: "reasoner"
    name: "推理者"
    emoji: "🟢"
    task: |
      质疑者已对你的上一轮回应提出新的质疑，请继续回应：

      ## 待求真主题
      {{topic}}

      ## 质疑者的新一轮质疑
      {{challenger_output}}

      ## 你的上一轮回应
      {{reasoner_output}}

      ## 输出要求

      ### 逐条回应新质疑
      对质疑者的每个新质疑，给出质疑点复述、现有证据（标注等级）、回应分析、承认的不确定性。

      ### 修正或补充
      如果之前的判断需要修正，请明确修正。

      ### 对质疑者论证的评估
      质疑者的论证质量如何？哪些质疑有道理，哪些是过度怀疑？

      ### 是否还有需要澄清的问题？
      如果认为质疑者的问题已基本回应完毕，请说"可结案"并说明理由。
      如果仍有需要讨论的问题，请说"继续"。

      要求：保持理性诚实。如果质疑者提出了你无法回答的问题，直接承认。不要为了辩护而辩护。
    output: reasoner_output
    depends_on: [challenger_round]

  # ── 循环：质疑者继续追问 ──
  - id: challenger_loop
    role: "challenger"
    name: "质疑者"
    emoji: "🔴"
    task: |
      推理者已回应，请继续深挖或宣布无新问题：

      ## 待求真主题
      {{topic}}

      ## 推理者的最新回应
      {{reasoner_output}}

      ## 你的上一轮质疑
      {{challenger_output}}

      ## 输出要求

      ### 对推理者最新回应的评估
      哪些回应是令人信服的？哪些回应仍有漏洞？

      ### 最终质疑（如有）
      如果还有未解决的问题，提出最后的追问。

      ### 结案判断
      明确表态：
      - "无新问题，可结案" — 如果所有核心问题都已充分辩论
      - "继续" — 如果仍有实质性未解决问题

      要求：如果连续两轮没有提出实质性新问题，应该宣布可结案。不要为了凑轮数而重复质疑。
    output: challenger_output
    depends_on: [reasoner_round]
    loop:
      back_to: reasoner_round
      max_iterations: 98
      exit_condition: "{{challenger_output}} contains 无新问题"

  # ── 第 5 步：裁判者总结 ──
  - id: judge_summary
    role: "judge"
    name: "裁判者"
    emoji: "⚖️"
    task: |
      质疑者与推理者已完成多轮辩论，请做最终裁决和总结：

      ## 待求真主题
      {{topic}}

      ## 完整辩论记录
      ### 质疑者首轮质疑
      {{challenger_round_1}}

      ### 推理者首轮回应
      {{reasoner_round_1}}

      ### 质疑者最终立场
      {{challenger_output}}

      ### 推理者最终立场
      {{reasoner_output}}

      ## 输出要求
      请输出最终求真报告：

      ---

      # 求真辨伪报告：{{topic}}

      ## 一、简短判断
      一句话总结核心结论。

      ## 二、命题拆分与分层判断

      | 层 | 问题 | 判断 | 证据等级 | 置信度 |
      |---|---|---|---|---|
      | 人物 | 这个人大概率存在吗？ | | | |
      | 事件 | 声称的事件发生过吗？ | | | |
      | 文本 | 现存最早的实物文本是什么？ | | | |
      | 归属 | 谁最先说这个文本/思想属于这个人？ | | | |
      | 学派 | 是否可能是学生或机构材料？ | | | |
      | 传承 | 抄写、编辑、翻译、注释链条 | | | |
      | 包装 | 后世如何简化了它？ | | | |

      ## 三、证据时间线
      从声称起源到现在的关键节点，标注每个节点的证据等级和可信度。

      ## 四、知识谱系
      - 前置问题与术语
      - 同代争论与独立验证
      - 后续承接与演变
      - 断裂点与黑箱

      ## 五、动机与利益图
      谁从当前叙事中获益？谁在维护它？

      ## 六、辩论质量评估
      - 质疑者最强论点（Top 3）
      - 推理者最强辩护（Top 3）
      - 双方均承认的不确定性
      - 未解决的争议点

      ## 七、分层结论
      使用归属阶梯给出最终判断：
      - 哪些层高度可信？
      - 哪些层存在品牌化/语料库化？
      - 哪些层属于后世神话？
      - 整体最可能解释是什么？

      ## 八、置信度与不确定性
      - 整体置信度（高/中/低）
      - 最大的不确定性来源
      - 什么新证据可以改变结论？

      ## 九、判断标签
      使用精确标签：已确认 / 高度可能 / 合理 / 待证 / 过度宣称 / 归属错误 / 品牌化 / 已证伪

      ---

      要求：每个判断都要有依据。不要模棱两可。承认不确定性但给出最可能解释。报告要能经得起第三方复核。
    output: final_report
    depends_on: [challenger_loop]

  # ── 第 6 步：Skill 优化者审查是否沉淀 ──
  - id: optimizer_review
    role: "optimizer"
    name: "Skill优化者"
    emoji: "🛠️"
    task: |
      辩论已结束，裁判者已给出分层结论。请审查整场辩论，判断是否值得沉淀到 skill 知识库：

      ## 待求真主题
      {{topic}}

      ## 话题搜集报告
      {{collector_report}}

      ## 裁判者最终报告
      {{final_report}}

      ## 你的任务
      1. 评估这场辩论是否产生了方法论增量（新红旗信号/新证据模式/新归属模式/新动机模式/方法论修正）
      2. 评估这场辩论是否具有案例价值（典型性/辩论质量/结论清晰度/教育价值/可复用性）
      3. 按入库决策矩阵做出判断

      ## 输出要求

      ### Skill 优化报告
      - 辩论概要
      - 方法论增量评估（有/无，具体内容）
      - 案例价值评估（五维度打分）
      - 入库决策（入库方法论+案例 / 仅入库方法论 / 仅入库案例 / 不入库）
      - 入库内容（如适用）：具体添加到哪个文件、什么位置、什么内容
      - 不入库说明（如适用）：原因和重新考虑的条件

      要求：严格把关，宁缺毋滥。方法论沉淀要精准，案例沉淀要结构化。SKILL.md 单次新增不超过现有内容的 20%。
    output: optimizer_report
    depends_on: [judge_summary]
